<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Cart | Tanishq</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="top-bar">
    Store Locator | Help | Track Order | Wishlist | Login
</div>

<nav class="navbar navbar-light bg-white">
    <div class="container">
        <a class="navbar-brand" href="/">TANISHQ</a>
    </div>
</nav>
<div class="container my-5">
    <h3>My Shopping Bag</h3>

    <div class="row mt-4">

        <!-- LEFT: CART ITEMS -->
        <div class="col-md-8">

            <!-- CART ITEM -->
            <div class="cart-item">
                <div class="row align-items-center">

                    <div class="col-md-3">
                        <div class="cart-img"></div>
                    </div>

                    <div class="col-md-5">
                        <h6>The Aura Gold Ring</h6>
                        <p>Product Code: G-22K-R04</p>
                        <p>Size: 14</p>
                        <a href="#" class="text-danger">Remove</a>
                    </div>

                    <div class="col-md-2">
                        <h6>₹ 85,999</h6>
                    </div>

                    <div class="col-md-2">
                        <select class="form-select">
                            <option>1</option>
                            <option>2</option>
                            <option>3</option>
                        </select>
                    </div>

                </div>
            </div>

            <!-- copy cart-item for more products -->

        </div>
        <!-- RIGHT: PRICE SUMMARY -->
        <div class="col-md-4">

            <div class="order-summary">
                <h5>Order Summary</h5>
                <hr>

                <p>Items (1) <span class="float-end">₹ 95,000</span></p>
                <p>Discount <span class="float-end text-success">- ₹ 9,001</span></p>

                <hr>

                <h6>Total <span class="float-end">₹ 85,999</span></h6>

                <a href="order-success.html" class="btn btn-dark w-100 mt-3">
                    PROCEED TO CHECKOUT
                </a>
            </div>

        </div>

    </div>
</div>

</body>
</html>
