<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Diamond Rings | Tanishq</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="top-bar">
    Store Locator | Help | Track Order | Wishlist | Login
</div>

<nav class="navbar navbar-expand-lg navbar-light bg-white">
    <div class="container">
        <a class="navbar-brand" href="/">TANISHQ</a>
    </div>
</nav>

<div class="container my-4">
    <p class="text-muted">Home > Jewellery > Rings</p>
    <h2>Diamond Rings</h2>
    <p>Showing 1 - 48 of 325 Products</p>
</div>

<div class="container">
    <div class="row">

        <div class="col-md-3">
            <h5>Refine Results</h5>

            <div class="filter-box">
                <h6>Metal Type</h6>
                <p><input type="checkbox"> Gold</p>
                <p><input type="checkbox"> Diamond</p>
                <p><input type="checkbox"> Platinum</p>
            </div>
        </div>

        <div class="col-md-9">
            <div class="row">
                <div class="col-md-4 mb-4">
                    <div class="product-card">
                        <div class="product-img"></div>
                        <h6>Gold Plated Ring</h6>
                        <p>₹ 45,900 <del>₹ 50,000</del></p>
                        <a href="#" class="btn btn-outline-dark btn-sm">View Details</a>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<footer class="footer mt-4">
    <p>© 2025 Tanishq Inspired Jewellery Website</p>
</footer>

</body>
</html>
