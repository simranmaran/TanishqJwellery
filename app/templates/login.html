{% extends 'base.html' %}

{% block title %}Login | Tanishq{% endblock %}

{% block content %}

<div class="container my-5">
    <div class="row justify-content-center align-items-center">

        <div class="col-md-5">
            <div class="login-box shadow-lg rounded p-4">

                <!-- Heading -->
                <h4 class="text-center mb-2 fw-bold">Welcome Back</h4>
                <p class="text-center text-muted mb-4">
                    Login to continue your jewellery journey
                </p>

                <!-- Login Form -->
                <form method="POST">
                    {% csrf_token %}

                    <!-- Email -->
                    <div class="mb-3">
                        <label class="form-label">Email address</label>
                        <input type="email"
                               name="email"
                               class="form-control form-control-lg"
                               placeholder="Enter your email"
                               required>
                    </div>

                    <!-- Password -->
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="password"
                               name="password"
                               class="form-control form-control-lg"
                               placeholder="Enter your password"
                               required>
                    </div>

                    <!-- Login Button -->
                    <button class="btn btn-dark w-100 py-2 mt-2">
                        Login
                    </button>
                </form>

                <!-- Footer -->
                <div class="text-center mt-4">
                    <small class="text-muted">
                        New User?
                        <a href="{% url 'signup' %}" class="fw-semibold">
                            Create an account
                        </a>
                    </small>
                </div>

            </div>
        </div>

    </div>
</div>

{% endblock %}
