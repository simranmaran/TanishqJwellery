<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login | Tanishq</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
    Store Locator | Help | Track Order | Wishlist | Login
</div>

<!-- NAVBAR -->
<nav class="navbar navbar-light bg-white">
    <div class="container">
        <a class="navbar-brand" href="index.html">TANISHQ</a>
    </div>
</nav>
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-5 login-box">

            <h4 class="text-center mb-3">Login to your account</h4>

            <p class="text-center">
                New User? <a href="signup.html">Sign Up here</a>
            </p>

            <input type="text" class="form-control mb-3"
                   placeholder="Mobile Number / Email ID">

            <input type="password" class="form-control mb-3"
                   placeholder="Password">

            <a href="#" class="d-block mb-3 text-end">Forgot Password?</a>

            <button class="btn btn-dark w-100 mb-3">LOGIN</button>

            <p class="text-center">OR</p>

            <button class="btn btn-outline-dark w-100 mb-2">
                Login with OTP
            </button>

            <p class="text-center text-muted mt-3">
                Your connection is secured by Tanishq & Titan
            </p>

        </div>
    </div>
</div>

</body>
</html>
