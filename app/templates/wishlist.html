<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Wishlist | Tanishq</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="top-bar">
    Store Locator | Help | Track Order | Wishlist | Login
</div>

<nav class="navbar navbar-light bg-white">
    <div class="container">
        <a class="navbar-brand" href="/">TANISHQ</a>
    </div>
</nav>
<div class="container my-5">
    <h3>My Wishlist</h3>
    <p class="text-muted">3 Items saved for later</p>

    <!-- WISHLIST ITEM -->
    <div class="wishlist-item">
        <div class="row align-items-center">

            <div class="col-md-2">
                <div class="wishlist-img"></div>
            </div>

            <div class="col-md-5">
                <h6>The Royal Charm Bangle</h6>
                <p>Product Code: G-22K-B15 | Size: 2.6</p>
                <p class="text-success">In Stock</p>
            </div>

            <div class="col-md-3">
                <h6>₹ 1,50,000</h6>
            </div>

            <div class="col-md-2">
                <a href="cart.html" class="btn btn-sm btn-dark mb-2">
                    MOVE TO CART
                </a>
                <br>
                <a href="#" class="text-danger">Remove</a>
            </div>

        </div>
    </div>

    <!-- COPY wishlist-item for more products -->

    <div class="text-end mt-4">
        <a href="cart.html" class="btn btn-outline-dark">
            MOVE ALL ITEMS TO BAG
        </a>
    </div>
</div>

</body>
</html>
