{% extends 'base.html' %}
{% block content %}

<h2 class="text-2xl tracking-widest text-gold mb-8">
  Edit Product
</h2>

<form method="POST" enctype="multipart/form-data"
      class="max-w-xl space-y-6">

  {% csrf_token %}

  <input name="name" value="{{ product.name }}"
         class="w-full bg-black border border-gray-600 p-3">

  <input name="price" value="{{ product.price }}"
         class="w-full bg-black border border-gray-600 p-3">

  <textarea name="description"
            class="w-full bg-black border border-gray-600 p-3">
    {{ product.description }}
  </textarea>

  <input type="file" name="image">

  <button class="px-10 py-3 border border-gold text-gold
                 hover:bg-gold hover:text-black transition">
    Update
  </button>
</form>

{% endblock %}
